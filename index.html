@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;}
:root{--bg:#F6F1FA;--paper:#FFF;--paper2:#F8F4FB;--ink:#2A1E36;--ink2:#6A5E78;--ink3:#9A8FA8;
--plum:#6E2C92;--plum2:#54206F;--plumbg:#F1E6F7;--emerald:#2F7D5B;--emeraldbg:#E3F0E9;--indigo:#3D5A80;
--gold:#B98A2E;--goldbg:#F5ECD8;--line:#E9DEF3;--line2:#DCCDEA;
--shadow:0 1px 2px rgba(42,30,54,.05),0 10px 30px rgba(84,32,111,.08);--shadow-sm:0 1px 2px rgba(42,30,54,.06);}
.ohc.dark{--bg:#171019;--paper:#221A2B;--paper2:#2B2136;--ink:#F1E9F6;--ink2:#BCACC8;--ink3:#897A95;
--plumbg:#3A2348;--emeraldbg:#1E3A2C;--goldbg:#3A3020;--line:#382B43;--line2:#48394F;
--shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.4);--shadow-sm:0 1px 2px rgba(0,0,0,.3);}
.ohc{font-family:'Manrope',sans-serif;color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
background:radial-gradient(1200px 520px at 88% -12%,rgba(110,44,146,.12),transparent 60%),radial-gradient(900px 520px at -6% 112%,rgba(110,44,146,.08),transparent 60%),var(--bg);}
.serif{font-family:'Fraunces',Georgia,serif;}.tnum{font-variant-numeric:tabular-nums;}
.wrap{max-width:1180px;margin:0 auto;padding:18px 14px calc(86px + env(safe-area-inset-bottom));}
.topbar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top);}
.topin{max-width:1180px;margin:0 auto;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;min-width:0;}
.brand h1{margin:0;font-size:16.5px;font-weight:600;letter-spacing:-.01em;color:var(--plum2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ohc.dark .brand h1{color:#D9BCEC;}
.brand p{margin:1px 0 0;font-size:9.5px;color:var(--ink3);letter-spacing:.14em;text-transform:uppercase;}
.sync{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.synbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:6px 9px;border-radius:99px;background:var(--emeraldbg);color:var(--emerald);}
.synbadge.err{background:#FBE0E0;color:#C0392B;}.synbadge.load{background:var(--plumbg);color:var(--plum);}
.ohc.dark .synbadge.err{background:#3A1F22;color:#F0A8A8;}
.refresh{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--paper);display:grid;place-items:center;cursor:pointer;color:var(--plum2);box-shadow:var(--shadow-sm);}
.ohc.dark .refresh{color:#D9BCEC;}
.refresh:active{transform:scale(.95);}.spin{animation:sp 1s linear infinite;}@keyframes sp{to{transform:rotate(360deg);}}
.botnav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:color-mix(in srgb,var(--paper) 94%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:7px 4px calc(7px + env(safe-area-inset-bottom));box-shadow:0 -6px 22px rgba(42,30,54,.08);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--ink3);font:inherit;font-size:9.5px;font-weight:700;padding:4px 1px;border-radius:12px;transition:color .15s;}
.bn-item span{white-space:nowrap;}
.bn-item.on{color:var(--plum);}
.ohc.dark .bn-item.on{color:#C9A4E0;}
.bn-item svg{width:21px;height:21px;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);}
.sec-h{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:2px 2px 15px;}
.sec-h .t{display:flex;align-items:center;gap:11px;}.sec-h h2{margin:0;font-size:21px;font-weight:600;letter-spacing:-.015em;}
.sec-h .sub{font-size:12px;color:var(--ink3);margin-top:2px;}
.ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--plumbg);color:var(--plum2);}
.ohc.dark .ic{color:#D9BCEC;}
.pane{animation:fu .35s ease both;}@keyframes fu{from{opacity:0;}to{opacity:1;}}
.stats{display:grid;gap:12px;grid-template-columns:repeat(4,1fr);}
@media(max-width:860px){.stats{grid-template-columns:1fr 1fr;}}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow-sm);}
.stat .k{font-size:10.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;display:flex;align-items:center;gap:6px;}
.stat .v{font-size:21px;font-weight:800;margin-top:7px;letter-spacing:-.02em;}
.stat.accent{background:linear-gradient(150deg,#3A2348,#2A1E36);border-color:#3A2348;color:#fff;}
.ohc.dark .stat.accent{background:linear-gradient(150deg,var(--plum),var(--plum2));border-color:transparent;}
.stat.accent .k{color:#C9B6DA;}.stat.accent .v{color:#fff;}
.dot{width:9px;height:9px;border-radius:50%;}
.searchbox{position:relative;flex:1;min-width:160px;}
.searchbox svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink3);}
.searchbox input{width:100%;padding:11px 13px 11px 40px;border:1px solid var(--line2);border-radius:12px;background:var(--paper2);font:inherit;font-size:14px;outline:none;color:var(--ink);}
.searchbox input:focus{border-color:var(--plum);}
.tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--line);-webkit-overflow-scrolling:touch;}
table.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:620px;}
.tbl thead th{text-align:left;padding:11px 12px;background:var(--paper2);color:var(--ink2);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line);white-space:nowrap;}
.tbl tbody td{padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
.tbl tbody tr:last-child td{border-bottom:none;}.tbl tbody tr:active{background:var(--paper2);}
.tbl tbody tr.row-out td{background:#FCE4E4;}.tbl tbody tr.row-low td{background:#FBF3D6;}
.ohc.dark .tbl tbody tr.row-out td{background:#3A1F22;}.ohc.dark .tbl tbody tr.row-low td{background:#36301B;}
.r{text-align:right;}.strong{font-weight:700;}.muted{color:var(--ink3);}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.b-cash{background:var(--emeraldbg);color:var(--emerald);}.b-card{background:#E4EAF3;color:var(--indigo);}
.ohc.dark .b-card{background:#23304A;color:#9DB6DC;}
.b-credit{background:var(--goldbg);color:var(--gold);}.b-usd{background:var(--plumbg);color:var(--plum2);}
.ohc.dark .b-usd{color:#D3AEE8;}.ohc.dark .b-credit{color:#E2C079;}
.b-out{background:#F6C9C9;color:#B0241F;}.b-warn{background:#F2E2B0;color:#8A6D1A;}
.empty{text-align:center;padding:42px 20px;color:var(--ink3);}
.empty .ec{width:54px;height:54px;border-radius:16px;background:var(--paper2);display:grid;place-items:center;margin:0 auto 13px;color:var(--ink3);}
.empty h4{margin:0 0 5px;color:var(--ink2);font-size:16px;font-weight:600;}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;}
.legend span{font-size:12px;color:var(--ink2);font-weight:600;display:flex;align-items:center;gap:7px;}
.note{font-size:12px;color:var(--ink3);}
.dash-charts{display:grid;gap:14px;grid-template-columns:1.6fr 1fr;}@media(max-width:820px){.dash-charts{grid-template-columns:1fr;}}
.center{min-height:60vh;display:grid;place-items:center;text-align:center;padding:24px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;border:1px solid transparent;background:linear-gradient(145deg,var(--plum),var(--plum2));color:#fff;padding:10px 15px;border-radius:11px;font:inherit;font-weight:700;font-size:13.5px;box-shadow:0 6px 16px rgba(110,44,146,.26);}
.btn:active{transform:translateY(1px);}.btn:disabled{opacity:.6;}
.btn.ghost{background:var(--paper);color:var(--ink);border-color:var(--line2);box-shadow:none;}
.iconbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--paper);display:grid;place-items:center;cursor:pointer;color:var(--plum2);}
.ohc.dark .iconbtn{color:#D3AEE8;}
.iconbtn:active{transform:scale(.95);}
.qrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.qbtn{cursor:pointer;border:1px solid var(--line2);background:var(--paper2);padding:8px 13px;border-radius:10px;font:inherit;font-weight:700;font-size:13px;color:var(--ink2);}
.qbtn.on{background:var(--plum);color:#fff;border-color:var(--plum);}
.qsep{font-size:13px;color:var(--ink3);font-weight:700;}
.dateinp{padding:9px 11px;border:1px solid var(--line2);border-radius:10px;background:var(--paper2);font:inherit;font-size:13.5px;color:var(--ink);outline:none;}
.dateinp:focus{border-color:var(--plum);}
.overlay{position:fixed;inset:0;background:rgba(30,20,40,.55);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:80;animation:fa .2s both;}
@media(min-width:560px){.overlay{align-items:center;padding:16px;}}
@keyframes fa{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--paper);border-radius:22px 22px 0 0;box-shadow:0 -10px 50px rgba(20,10,30,.4);width:100%;max-width:560px;max-height:92vh;overflow:auto;animation:su .28s cubic-bezier(.2,.8,.2,1) both;}
@media(min-width:560px){.modal{border-radius:22px;animation:pp .25s cubic-bezier(.2,.8,.2,1) both;}}
@keyframes su{from{transform:translateY(100%);}to{transform:none;}}@keyframes pp{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:2;}
.modal-h h3{margin:0;font-size:18px;font-weight:600;}
.modal-b{padding:18px;}
.modal-f{display:flex;gap:10px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--paper);}
.grid{display:grid;gap:12px;}.g2{grid-template-columns:1fr 1fr;}@media(max-width:480px){.g2{grid-template-columns:1fr;}}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--ink2);margin:0 0 5px 2px;text-transform:uppercase;letter-spacing:.03em;}
.inp{width:100%;padding:11px 12px;border:1px solid var(--line2);border-radius:10px;background:var(--paper2);font:inherit;font-size:15px;color:var(--ink);outline:none;}
.inp:focus{border-color:var(--plum);}
.inp:disabled{opacity:.7;}
.auto{font-size:9px;font-weight:800;color:var(--plum2);background:var(--plumbg);padding:1px 6px;border-radius:99px;letter-spacing:.04em;}
.ohc.dark .auto{color:#D3AEE8;}
.pills{display:flex;gap:7px;flex-wrap:wrap;}
.pill{cursor:pointer;border:1px solid var(--line2);background:var(--paper2);padding:10px 12px;border-radius:10px;font:inherit;font-weight:700;font-size:12.5px;color:var(--ink2);flex:1;text-align:center;}
.pill.on{background:var(--plum);color:#fff;border-color:var(--plum);}
.pill.on-cash{background:var(--emerald);color:#fff;border-color:var(--emerald);}
.pill.on-card{background:var(--indigo);color:#fff;border-color:var(--indigo);}
.pill.on-credit{background:var(--gold);color:#fff;border-color:var(--gold);}
.info{background:var(--paper2);border:1px dashed var(--line2);border-radius:11px;padding:10px 13px;font-size:13px;color:var(--ink2);}
.errbox{background:#FBE4E4;border:1px solid #F1C0C0;color:#B0241F;border-radius:10px;padding:11px 13px;font-size:13px;font-weight:600;white-space:pre-wrap;word-break:break-word;margin-top:12px;}
.ohc.dark .errbox{background:#3A1F22;border-color:#5A2F2F;color:#F2B0B0;}
.totalbox{background:var(--paper2);border:1px dashed var(--line2);border-radius:12px;padding:13px 15px;}
.totalbox .big{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:3px;}
.toast{position:fixed;left:50%;bottom:calc(80px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:90;display:flex;align-items:center;gap:9px;padding:12px 18px;border-radius:13px;font-weight:700;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);animation:ts .25s both;max-width:92vw;}
@keyframes ts{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
.toast.ok{background:#234C38;color:#fff;}.toast.err{background:#7A241F;color:#fff;}
