@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap');

* { box-sizing: border-box; }
:root{
  --bg:#F6F1FA; --paper:#FFFFFF; --paper2:#F8F4FB;
  --ink:#2A1E36; --ink2:#6A5E78; --ink3:#9A8FA8;
  --plum:#6E2C92; --plum2:#54206F; --plumbg:#F1E6F7;
  --emerald:#2F7D5B; --emeraldbg:#E3F0E9;
  --indigo:#3D5A80;
  --gold:#B98A2E; --goldbg:#F5ECD8;
  --line:#E9DEF3; --line2:#DCCDEA;
  --shadow:0 1px 2px rgba(42,30,54,.05),0 10px 30px rgba(84,32,111,.08);
  --shadow-sm:0 1px 2px rgba(42,30,54,.06);
}
.ohc{
  font-family:'Manrope',sans-serif; color:var(--ink);
  background:
    radial-gradient(1200px 520px at 88% -12%, rgba(110,44,146,.12), transparent 60%),
    radial-gradient(900px 520px at -6% 112%, rgba(110,44,146,.08), transparent 60%),
    var(--bg);
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
.serif{ font-family:'Fraunces',Georgia,serif; }
.tnum{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }

/* layout */
.wrap{ max-width:1180px; margin:0 auto; padding:0 18px 60px; }
.topbar{ position:sticky; top:0; z-index:30;
  background:rgba(255,255,255,.82); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line); }
.topin{ max-width:1180px; margin:0 auto; padding:13px 18px;
  display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:12px; }
.brand h1{ margin:0; font-size:20px; font-weight:600; letter-spacing:-.01em; color:var(--plum2); }
.brand p{ margin:1px 0 0; font-size:11px; color:var(--ink3); letter-spacing:.16em; text-transform:uppercase; }
.rate{ display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--line);
  padding:7px 12px; border-radius:11px; box-shadow:var(--shadow-sm); }
.rate label{ font-size:11px; color:var(--ink3); text-transform:uppercase; letter-spacing:.05em; }
.rate input{ width:84px; border:none; background:transparent; font:inherit; font-weight:700; color:var(--ink);
  text-align:right; outline:none; }
.rate span{ font-size:12px; color:var(--ink2); font-weight:600; }

/* tabs */
.tabs{ display:flex; gap:6px; overflow-x:auto; padding:14px 2px 6px; scrollbar-width:none; }
.tabs::-webkit-scrollbar{ display:none; }
.tab{ display:inline-flex; align-items:center; gap:8px; white-space:nowrap; cursor:pointer;
  border:1px solid var(--line); background:var(--paper); color:var(--ink2);
  padding:9px 15px; border-radius:11px; font-weight:600; font-size:13.5px; transition:all .15s; }
.tab:hover{ border-color:var(--line2); color:var(--ink); }
.tab.on{ background:linear-gradient(145deg,var(--plum),var(--plum2)); color:#fff; border-color:transparent; box-shadow:0 6px 16px rgba(110,44,146,.26); }
.tab.on svg{ color:#E3C7F2; }

/* cards / sections */
.card{ background:var(--paper); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); }
.sec-h{ display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin:6px 2px 16px; }
.sec-h .t{ display:flex; align-items:center; gap:11px; }
.sec-h h2{ margin:0; font-size:23px; font-weight:600; letter-spacing:-.015em; }
.sec-h .sub{ font-size:12.5px; color:var(--ink3); margin-top:2px; }
.ic{ width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--plumbg);color:var(--plum2); }

.pane{ animation:fadeup .4s cubic-bezier(.2,.7,.2,1) both; }
@keyframes fadeup{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }

/* inputs */
.label{ display:block; font-size:11.5px; font-weight:700; color:var(--ink2); margin:0 0 6px 2px;
  text-transform:uppercase; letter-spacing:.04em; }
.input, .select{ width:100%; padding:11px 13px; border:1px solid var(--line2); border-radius:11px;
  background:var(--paper2); font:inherit; font-size:14.5px; color:var(--ink); outline:none; transition:all .15s; }
.input:focus,.select:focus{ border-color:var(--plum); background:#fff; box-shadow:0 0 0 3px rgba(110,44,146,.14); }
.input::placeholder{ color:var(--ink3); }
.grid{ display:grid; gap:13px; }
.g2{ grid-template-columns:1fr 1fr; } .g3{ grid-template-columns:1fr 1fr 1fr; }
.g4{ grid-template-columns:repeat(4,1fr); }
@media(max-width:760px){ .g2,.g3,.g4{ grid-template-columns:1fr 1fr; } }
@media(max-width:480px){ .g2,.g3,.g4{ grid-template-columns:1fr; } }

/* buttons */
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
  border:1px solid var(--line2); background:var(--paper); color:var(--ink);
  padding:11px 17px; border-radius:11px; font:inherit; font-weight:700; font-size:14px; transition:all .15s; }
.btn:hover{ border-color:var(--ink3); }
.btn:active{ transform:translateY(1px); }
.btn-primary{ background:linear-gradient(145deg,var(--plum),var(--plum2)); color:#fff; border-color:transparent;
  box-shadow:0 6px 16px rgba(110,44,146,.30); }
.btn-primary:hover{ filter:brightness(1.06); }
.btn-ghost{ background:transparent; border-color:transparent; padding:8px 12px; }
.btn-sm{ padding:7px 12px; font-size:13px; border-radius:9px; }
.iconbtn{ width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--paper);
  display:grid;place-items:center;cursor:pointer;color:var(--ink2);transition:all .15s; }
.iconbtn:hover{ color:var(--plum); border-color:var(--plum); }
.iconbtn.danger:hover{ color:#fff; background:#C0392B; border-color:#C0392B; }

/* search */
.searchbox{ position:relative; flex:1; min-width:200px; }
.searchbox svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--ink3); }
.searchbox input{ width:100%; padding:10px 13px 10px 40px; border:1px solid var(--line2);
  border-radius:11px; background:var(--paper2); font:inherit; font-size:14px; outline:none; }
.searchbox input:focus{ border-color:var(--plum); background:#fff; }

/* table */
.tbl-wrap{ overflow-x:auto; border-radius:14px; border:1px solid var(--line); }
table.tbl{ width:100%; border-collapse:collapse; font-size:13.5px; min-width:600px; }
.tbl thead th{ text-align:left; padding:12px 14px; background:var(--paper2); color:var(--ink2);
  font-weight:700; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em;
  border-bottom:1px solid var(--line); white-space:nowrap; }
.tbl tbody td{ padding:12px 14px; border-bottom:1px solid var(--line); color:var(--ink); white-space:nowrap; }
.tbl tbody tr:last-child td{ border-bottom:none; }
.tbl tbody tr:hover{ background:var(--paper2); }
.r{ text-align:right; } .strong{ font-weight:700; }
.muted{ color:var(--ink3); }

/* badges */
.badge{ display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:99px;
  font-size:11.5px; font-weight:700; }
.b-cash{ background:var(--emeraldbg); color:var(--emerald); }
.b-card{ background:#E4EAF3; color:var(--indigo); }
.b-credit{ background:var(--goldbg); color:var(--gold); }
.b-low{ background:#FBE0E0; color:#C0392B; }
.b-paid{ background:var(--emeraldbg); color:var(--emerald); }
.b-due{ background:#FBE0E0; color:#C0392B; }
.b-usd{ background:var(--plumbg); color:var(--plum2); }

/* stat cards */
.stats{ display:grid; gap:14px; grid-template-columns:repeat(4,1fr); }
@media(max-width:860px){ .stats{ grid-template-columns:1fr 1fr; } }
@media(max-width:430px){ .stats{ grid-template-columns:1fr; } }
.stat{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:17px 18px;
  box-shadow:var(--shadow-sm); }
.stat .k{ font-size:11.5px; color:var(--ink3); text-transform:uppercase; letter-spacing:.05em; font-weight:700;
  display:flex; align-items:center; gap:7px; }
.stat .v{ font-size:25px; font-weight:800; margin-top:9px; letter-spacing:-.02em; }
.stat .u{ font-size:13px; color:var(--ink3); font-weight:600; margin-top:2px; }
.stat.accent{ background:linear-gradient(150deg,#3A2348,#2A1E36); border-color:#3A2348; color:#fff; }
.stat.accent .k{ color:#C9B6DA; } .stat.accent .v{ color:#fff; } .stat.accent .u{ color:#A595B5; }
.dot{ width:9px;height:9px;border-radius:50%; }

/* modal */
.overlay{ position:fixed; inset:0; background:rgba(42,30,54,.5); backdrop-filter:blur(4px);
  display:grid; place-items:center; padding:18px; z-index:60; animation:fade .2s both; }
@keyframes fade{ from{opacity:0;} to{opacity:1;} }
.modal{ background:var(--paper); border-radius:20px; box-shadow:0 24px 60px rgba(40,20,60,.34);
  width:100%; max-width:520px; max-height:90vh; overflow:auto; animation:pop .25s cubic-bezier(.2,.8,.2,1) both; }
@keyframes pop{ from{opacity:0; transform:scale(.96) translateY(8px);} to{opacity:1; transform:none;} }
.modal-h{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px;
  border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--paper); }
.modal-h h3{ margin:0; font-size:18px; font-weight:600; }
.modal-b{ padding:20px; }
.modal-f{ display:flex; gap:10px; justify-content:flex-end; padding:16px 20px; border-top:1px solid var(--line);
  position:sticky; bottom:0; background:var(--paper); }

/* misc */
.empty{ text-align:center; padding:46px 20px; color:var(--ink3); }
.empty .ec{ width:56px;height:56px;border-radius:16px;background:var(--paper2);display:grid;place-items:center;
  margin:0 auto 14px; color:var(--ink3); }
.empty h4{ margin:0 0 5px; color:var(--ink2); font-size:16px; font-weight:600; }
.pill-row{ display:flex; gap:8px; flex-wrap:wrap; }
.pill{ cursor:pointer; border:1px solid var(--line2); background:var(--paper2); padding:11px 14px; border-radius:12px;
  font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:8px; color:var(--ink2); transition:all .15s; flex:1; justify-content:center; }
.pill.on{ background:var(--plum); color:#fff; border-color:var(--plum); }
.pill.on-cash{ background:var(--emerald); color:#fff; border-color:var(--emerald); }
.pill.on-card{ background:var(--indigo); color:#fff; border-color:var(--indigo); }
.pill.on-credit{ background:var(--gold); color:#fff; border-color:var(--gold); }
.totalbox{ background:var(--paper2); border:1px dashed var(--line2); border-radius:13px; padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.totalbox .som{ font-size:24px; font-weight:800; letter-spacing:-.02em; }
.totalbox .usd{ font-size:14px; color:var(--ink2); font-weight:700; }
.hint{ font-size:12px; color:var(--ink3); margin-top:6px; }
.subnav{ display:inline-flex; background:var(--paper2); border:1px solid var(--line); border-radius:11px; padding:4px; gap:4px; }
.subnav button{ border:none; background:transparent; padding:8px 14px; border-radius:8px; font:inherit; font-weight:700;
  font-size:13px; cursor:pointer; color:var(--ink2); }
.subnav button.on{ background:var(--paper); color:var(--plum); box-shadow:var(--shadow-sm); }
.legend{ display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; }
.legend span{ font-size:12.5px; color:var(--ink2); font-weight:600; display:flex; align-items:center; gap:7px; }
.note{ font-size:12px; color:var(--ink3); }
.dash-charts{ display:grid; gap:16px; grid-template-columns:1.6fr 1fr; }
@media(max-width:820px){ .dash-charts{ grid-template-columns:1fr; } }
